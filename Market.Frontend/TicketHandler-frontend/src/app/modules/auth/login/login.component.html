<!-- src/app/pages/auth/login/login.component.html -->
<div class="auth-container">
  <div class="auth-background">
    <!-- Decorative elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="auth-content">
    <!-- Logo & Brand -->
    <div class="auth-brand">
      <mat-icon class="brand-icon">storefront</mat-icon>
      <h1 class="brand-name">TicketHandler</h1>
      <p class="brand-tagline">Welcome back</p>
    </div>

    <!-- Login Card -->
    <mat-card class="auth-card mat-elevation-z8">
      <mat-card-header>
        <mat-card-title>{{ 'AUTH.LOGIN.TITLE' | translate }}</mat-card-title>
        <mat-card-subtitle>You will be redirected to the secure sign-in page</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <!-- Error message -->
        <div *ngIf="errorMessage" class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="redirect-status">
          <mat-progress-spinner
            mode="indeterminate"
            diameter="32"
            strokeWidth="3"
          ></mat-progress-spinner>
          <span>Redirecting to secure sign-in…</span>
        </div>

        <!-- Fallback if the automatic redirect is blocked -->
        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="button"
            class="submit-button"
            (click)="signIn()"
          >
            <mat-icon>login</mat-icon>
            {{ 'AUTH.LOGIN.BUTTON' | translate }}
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Footer -->
    <div class="auth-footer">
      <a routerLink="/" class="back-link">
        <mat-icon>arrow_back</mat-icon>
        Back to homepage
      </a>
    </div>
  </div>
</div>
